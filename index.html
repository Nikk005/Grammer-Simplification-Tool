<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CFG SIMPLIFIER</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --card: #1a1e2a;
    --border: #252a38;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --text: #e2e8f0;
    --muted: #64748b;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; line-height: 1.6; }
  header { padding: 3rem 2rem; text-align: center; border-bottom: 1px solid var(--border); background: linear-gradient(to bottom, #13161e, #0d0f14); }
  h1 { font-family: var(--font-head); font-size: 3rem; font-weight: 800; letter-spacing: -0.05em; color: var(--text); text-transform: uppercase; margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); font-size: 0.9rem; font-family: var(--font-head); letter-spacing: 0.1em; }
  .container { max-width: 1000px; margin: 0 auto; padding: 3rem 1.5rem; }
  .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; margin-bottom: 3rem; }
  textarea { width: 100%; height: 220px; background: #080a0f; color: var(--accent); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; font-family: var(--font-mono); font-size: 1rem; outline: none; resize: none; border-left: 4px solid var(--accent2); }
  .controls { display: flex; gap: 1rem; margin-top: 1.5rem; }
  button { padding: 1rem 2rem; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; font-family: var(--font-head); transition: 0.3s; text-transform: uppercase; letter-spacing: 0.05em; }
  .btn-solve { background: var(--accent2); color: #fff; box-shadow: 0 4px 14px rgba(129, 140, 248, 0.4); }
  .btn-solve:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .btn-sample { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  
  /* Step Cards Matching Your Snippet */
  .step-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 2rem; overflow: hidden; animation: slideUp 0.5s ease-out; }
