<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CFG SIMPLIFIER</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #09090b;
    --surface: #121215;
    --card: #18181b;
    --border: #27272a;
    --accent-blue: #3b82f6;
    --accent-emerald: #10b981;
    --text-main: #fafafa;
    --text-muted: #a1a1aa;
    --font-sans: 'Plus Jakarta Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background-color: var(--bg); 
    color: var(--text-main); 
    font-family: var(--font-sans); 
    line-height: 1.6;
    background-image: radial-gradient(circle at 50% -20%, #3b82f615, transparent);
  }

  header { 
    padding: 2.5rem 10%; 
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: rgba(9, 9, 11, 0.8);
    backdrop-filter: blur(10px);
  }

  h1 { 
    font-weight: 800; 
    font-size: 2.5rem; 
    letter-spacing: -0.04em; 
    text-transform: uppercase;
    background: linear-gradient(to right, #fff, #a1a1aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem; }

  .input-panel { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: 20px; 
    padding: 2rem; 
    margin-bottom: 3rem;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

    width: 100%; height: 200px; 
    background: #000; color: var(--accent-emerald); 
    border: 1px solid var(--border); border-radius: 12px;
