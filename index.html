<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CFG Simplifier</title>
<style>
body { background:#0d0f14;color:#e2e8f0;font-family:monospace;padding:20px;}
textarea{width:100%;height:150px;background:#111;color:#0f0;padding:10px;}
button{padding:10px;margin-top:10px;}
</style>
</head>

<body>

<h2>CFG Simplifier</h2>

<textarea id="grammarInput">
S -> aA | B
A -> a | ε
B -> b | C
C -> c
</textarea>

<br>
<button onclick="simplify()">Simplify</button>

<pre id="output"></pre>

<script>

// FIX: tokenizer
function tokenize(rhs){
  return rhs.split('').filter(c => c.trim() !== '');
}

function parseGrammar(text){
  const rules={}, order=[];
  const lines=text.trim().split('\n').filter(l=>l.trim());

  for(const line of lines){
    const parts=line.split('->');
    if(parts.length < 2) continue;

    const lhs = parts[0].trim();
    const rhss = parts[1].split('|').map(r=>r.trim());

    if(!rules[lhs]){
      rules[lhs]=[];
      order.push(lhs);
    }

    for(let rhs of rhss){
      if(rhs === 'ε' || rhs === '#' || rhs === 'epsilon'){
        if(!rules[lhs].includes('ε')) rules[lhs].push('ε');
      } else {
        const tokens = tokenize(rhs).join(' ');
        if(!rules[lhs].includes(tokens)) rules[lhs].push(tokens);
      }
    }
  }

  return {rules, start: order[0], order};
}

function findNullable(rules){
  const nullable = new Set();
  let changed = true;

  while(changed){
    changed = false;
    for(const [lhs, prods] of Object.entries(rules)){
      if(nullable.has(lhs)) continue;

      for(const prod of prods){
        if(prod === 'ε'){
          nullable.add(lhs);
          changed = true;
          break;
        }

        const syms = prod.split(' ');
        if(syms.every(s => nullable.has(s))){
          nullable.add(lhs);
          changed = true;
          break;
        }
      }
    }
  }

  return nullable;
}

function eliminateNull(g){
  const {rules, start} = g;
  const nullable = findNullable(rules);
  const newRules = {};

  for(const lhs in rules){
    newRules[lhs] = [];

    for(const prod of rules[lhs]){
      if(prod === 'ε') continue;

      const syms = prod.split(' ');
      const count = 1 << syms.length;

      for(let mask = 0; mask < count; mask++){
        let result = [];

        for(let i = 0; i < syms.length; i++){
          if(nullable.has(syms[i]) && ((mask >> i) & 1)) continue;
          result.push(syms[i]);
        }

        if(result.length){
          const str = result.join(' ');
          if(!newRules[lhs].includes(str)){
            newRules[lhs].push(str);
          }
        }
      }
    }
  }

  if(nullable.has(start)){
    if(!newRules[start]) newRules[start] = [];
    if(!newRules[start].includes('ε')) newRules[start].push('ε');
  }

  return {rules: newRules, start};
}

function simplify(){
  const text = document.getElementById('grammarInput').value;
  const g = parseGrammar(text);
  const g1 = eliminateNull(g);

  let out = "";

  for(const lhs in g1.rules){
    out += lhs + " -> " + g1.rules[lhs].join(" | ") + "\n";
  }

  document.getElementById('output').textContent = out;
}

</script>

</body>
</html>
